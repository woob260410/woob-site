<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no, address=no, email=no" />
  <title>WooB 꽃집 전용 브로슈어</title>
  <meta name="description" content="꽃집 시즌 운영을 더 쉽게 만드는 WooB 꽃집 전용 브로슈어" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            soft: '0 10px 30px rgba(0,0,0,0.08)',
          },
        },
      },
    };
  </script>
  <style>
    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      background: #ffffff;
      color: #1c1917;
      word-break: keep-all;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script type="text/babel">
    const { useEffect, useRef, useState } = React;

    const LucideIcon = ({ name, size = 24, className = "" }) => {
      const iconRef = useRef(null);

      useEffect(() => {
        if (window.lucide && iconRef.current) {
          window.lucide.createIcons({ targets: [iconRef.current] });
        }
      }, [name]);

      return (
        <i
          ref={iconRef}
          data-lucide={name}
          className={className}
          style={{ width: size, height: size, display: 'inline-block' }}
          aria-hidden="true"
        ></i>
      );
    };

    const BrochureSection = ({ id, title, subtitle, footer, bg, children, isDark = false }) => (
      <section
        className={`relative overflow-hidden border-b border-stone-100 ${bg}`}
      >
        <div className="mx-auto flex min-h-[100svh] w-full max-w-6xl items-center px-5 pb-14 pt-24 sm:px-8 sm:pt-28 md:px-10 md:pb-20 md:pt-32">
          <div className="grid w-full grid-cols-1 items-center gap-8 md:grid-cols-2 md:gap-12 lg:gap-16">
            <div className="space-y-5 md:space-y-6">
              <div className="space-y-2.5 md:space-y-3">
                <span className={`inline-block text-[11px] font-bold tracking-[0.22em] uppercase opacity-70 sm:text-xs ${isDark ? 'text-emerald-400' : 'text-emerald-800'}`}>
                  PAGE 0{id}
                </span>
                <h2 className={`whitespace-pre-line text-[1.85rem] font-black leading-[1.15] sm:text-[2.25rem] md:text-5xl ${isDark ? 'text-white' : 'text-stone-900'}`}>
                  {title}
                </h2>
              </div>

              <p className={`text-base leading-7 opacity-90 sm:text-lg sm:leading-8 md:text-xl md:leading-9 ${isDark ? 'text-emerald-50/90' : 'text-stone-600'}`}>
                {subtitle}
              </p>

              {footer ? (
                <div className={`pt-5 md:pt-6 border-t ${isDark ? 'border-white/10' : 'border-stone-200'}`}>
                  <p className={`text-sm font-bold sm:text-base ${isDark ? 'text-emerald-400' : 'text-emerald-700'}`}>
                    {footer}
                  </p>
                </div>
              ) : null}
            </div>

            <div className="w-full">
              {children}
            </div>
          </div>
        </div>
      </section>
    );

    const packageItems = [
      { label: "기본 운영", name: "라이트", price: "968,000원", desc: "대표 상품 중심의 기본 운영" },
      { label: "추천", name: "스탠다드", price: "1,089,000원", desc: "시즌 2개 흐름 운영, 가장 추천", highlight: true },
      { label: "브랜딩 운영", name: "프리미엄", price: "1,815,000원", desc: "브랜딩과 문의 동선까지 연결하는 운영형" },
    ];

    const painPoints = [
      { icon: "refresh-cw", text: "문구 수정 및 교체", color: "text-rose-400" },
      { icon: "scissors", text: "출력 및 부착 작업", color: "text-amber-400" },
      { icon: "calendar", text: "시즌별 포스터 제작", color: "text-blue-400" },
      { icon: "check-circle", text: "재고 확인 및 연동", color: "text-emerald-400" },
    ];

    const seasonCards = [
      { title: "봄 시즌", color: "bg-green-100", img: "🌷", tag: "Spring" },
      { title: "가정의 달", color: "bg-rose-100", img: "💝", tag: "Family" },
      { title: "졸업 시즌", color: "bg-blue-100", img: "🎓", tag: "Grad" },
      { title: "일반 운영", color: "bg-stone-100", img: "🌿", tag: "Daily" },
    ];

    const App = () => {
      const [isContactOpen, setIsContactOpen] = useState(false);
      const [copyMessage, setCopyMessage] = useState('번호 복사');
      const phoneNumber = '010-5549-8372';
      const phoneHref = 'tel:01055498372';
      const smsHref = 'sms:01055498372';

      const handleCopyNumber = async () => {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(phoneNumber);
          } else {
            const tempInput = document.createElement('textarea');
            tempInput.value = phoneNumber;
            tempInput.setAttribute('readonly', '');
            tempInput.style.position = 'absolute';
            tempInput.style.left = '-9999px';
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
          }
          setCopyMessage('복사 완료');
          window.setTimeout(() => setCopyMessage('번호 복사'), 2000);
        } catch (error) {
          setCopyMessage('복사 실패');
          window.setTimeout(() => setCopyMessage('번호 복사'), 2000);
        }
      };

      return (
        <div className="min-h-screen bg-white font-sans text-stone-900 selection:bg-emerald-100 selection:text-emerald-950">
          <nav className="fixed inset-x-0 top-0 z-50 border-b border-stone-200/70 bg-white/85 backdrop-blur-md">
            <div className="mx-auto flex h-16 w-full max-w-6xl items-center justify-between px-5 sm:px-8 md:px-10">
              <div className="font-black tracking-tighter text-emerald-900 text-xl sm:text-2xl">WooB.</div>
              <div className="text-[11px] font-semibold tracking-[0.18em] uppercase text-stone-400 sm:text-xs">Flower Brochure</div>
            </div>
          </nav>

          <BrochureSection
            id={1}
            title={"매번 홍보물 만들기,\n이제 조금 덜 힘들어도 됩니다"}
            subtitle={"꽃집은 시즌이 곧 매출입니다. 하지만 계절과 이벤트가 바뀔 때마다 홍보를 다시 만드는 일은 늘 부담이 됩니다."}
            footer={"꽃집 홍보도 운영이 쉬워야 오래 갑니다"}
            bg="bg-[#FDFBF7]"
          >
            <div className="relative flex h-[21rem] w-full items-center justify-center sm:h-96 md:h-[28rem]">
              <div className="absolute left-0 top-2 z-20 hidden rounded-2xl border border-stone-100 bg-white p-4 shadow-soft rotate-[-4deg] md:block lg:p-6">
                <p className="mb-1 text-xs font-bold italic text-rose-500">MAY EVENT</p>
                <p className="text-sm font-bold text-stone-800 lg:text-base">어버이날 예약 접수</p>
              </div>

              <div className="absolute bottom-4 right-0 z-20 hidden rounded-2xl border border-stone-100 bg-white p-4 shadow-soft rotate-[4deg] md:block lg:p-6">
                <p className="mb-1 text-xs font-bold italic text-emerald-600">GRADUATION</p>
                <p className="text-sm font-bold text-stone-800 lg:text-base">졸업식 꽃다발 안내</p>
              </div>

              <div className="relative h-full w-full max-w-[17.5rem] overflow-hidden rounded-[2rem] border-[6px] border-white bg-stone-200 shadow-2xl sm:max-w-[19rem] md:max-w-[22rem] md:border-8 group">
                <img
                  src="https://images.unsplash.com/photo-1526047932273-341f2a7631f9?auto=format&fit=crop&q=80&w=1200"
                  alt="풍성한 꽃다발을 들고 있는 모습"
                  className="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110"
                />
                <div className="absolute inset-0 bg-emerald-950/10 transition-all group-hover:bg-transparent"></div>
              </div>
            </div>
          </BrochureSection>

          <BrochureSection
            id={2}
            title={"사장님이 진짜 힘든 건,\n계속 다시 만드는 일입니다"}
            subtitle={"포스터 새로 만들고, 문구 바꾸고, 출력하고, 붙이고, 다시 교체하고. 꽃집은 이런 반복 업무가 계속 쌓입니다."}
            footer={"예쁜 홍보보다, 계속 운영 가능한 홍보가 필요할 때"}
            bg="bg-white"
          >
            <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 sm:gap-5">
              {painPoints.map((item, idx) => (
                <div key={idx} className="flex flex-col items-start gap-4 rounded-[1.75rem] border border-stone-100 bg-stone-50 p-5 transition-all hover:border-emerald-200 hover:bg-white sm:p-6 md:p-8">
                  <div className={item.color}>
                    <LucideIcon name={item.icon} size={30} />
                  </div>
                  <p className="text-base font-bold leading-tight text-stone-700 sm:text-[1.02rem]">{item.text}</p>
                </div>
              ))}
            </div>
          </BrochureSection>

          <BrochureSection
            id={3}
            title={"그래서 필요한 건\n운영하기 쉬운 방식입니다"}
            subtitle={"WooB은 꽃집 홍보를 한 번 반짝하고 끝나는 방식이 아니라 시즌마다 바꿔가며 운영하기 쉬운 방식으로 만듭니다."}
            footer={"이번 시즌도, 다음 시즌도 이어서 쓰기 쉽게"}
            bg="bg-[#F7F9F7]"
          >
            <div className="flex min-h-[20rem] flex-col items-center justify-center overflow-hidden rounded-[2rem] border border-emerald-100 bg-white px-5 py-8 text-center shadow-2xl sm:min-h-96 sm:px-8 sm:py-10 md:px-12 md:py-12">
              <div className="mb-7 flex justify-center gap-3 sm:gap-5 md:gap-8">
                <div className="flex h-14 w-14 items-center justify-center rounded-2xl bg-rose-50 text-rose-500 shadow-sm sm:h-16 sm:w-16"><LucideIcon name="flower" size={28} /></div>
                <div className="flex h-14 w-14 items-center justify-center rounded-2xl bg-emerald-50 text-emerald-500 shadow-sm sm:h-16 sm:w-16"><LucideIcon name="calendar" size={28} /></div>
                <div className="flex h-14 w-14 items-center justify-center rounded-2xl bg-amber-50 text-amber-500 shadow-sm sm:h-16 sm:w-16"><LucideIcon name="user" size={28} /></div>
              </div>

              <div className="space-y-3">
                <p className="text-xl font-black text-emerald-900 sm:text-2xl md:text-3xl">시즌 최적화 오토-디스플레이</p>
                <p className="text-sm italic text-stone-500 sm:text-base md:text-lg">봄 시즌 → 가정의 달 → 졸업 시즌</p>
                <div className="mx-auto mt-4 inline-flex items-center justify-center gap-2 rounded-full bg-emerald-50 px-4 py-2 text-sm font-bold text-emerald-600 sm:text-base">
                  <LucideIcon name="refresh-cw" size={16} className="animate-spin" />
                  실시간 콘텐츠 업데이트
                </div>
              </div>
            </div>
          </BrochureSection>

          <BrochureSection
            id={4}
            title={"우리 꽃집에 맞는\n운영 방식은 3가지입니다"}
            subtitle={"처음부터 크게보다, 우리 매장에 맞게 선택하세요."}
            bg="bg-white"
          >
            <div className="space-y-4 text-left">
              {packageItems.map((item, idx) => (
                <div
                  key={idx}
                  className={`relative rounded-[1.75rem] border-2 p-5 transition-all sm:p-6 md:p-8 ${item.highlight ? 'border-emerald-500 bg-emerald-50/40' : 'border-stone-100 bg-white hover:border-stone-300'}`}
                >
                  <span className={`absolute -top-3 left-5 rounded-full px-3 py-1 text-[11px] font-bold sm:left-8 ${item.highlight ? 'bg-emerald-500 text-white' : 'bg-stone-200 text-stone-600'}`}>
                    {item.label}
                  </span>

                  <div className="flex flex-col gap-4 sm:gap-5 md:flex-row md:items-center md:justify-between">
                    <div>
                      <h4 className="text-2xl font-black text-stone-800 transition-colors md:text-[1.75rem]">{item.name}</h4>
                      <p className="mt-1 text-sm text-stone-500 sm:text-base">{item.desc}</p>
                    </div>

                    <div className="text-left md:text-right">
                      <p className="text-2xl font-black text-emerald-800 md:text-[1.9rem]">{item.price}</p>
                      <p className="mt-1 text-[10px] uppercase tracking-[0.18em] text-stone-400">one-time payment</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </BrochureSection>

          <BrochureSection
            id={5}
            title={"꽃집에 바로 적용할 수 있는\n시즌 운영 예시"}
            subtitle={"봄 시즌 / 가정의 달 / 졸업 시즌 / 일반 운영까지 흐름에 맞춰 대표 상품과 문구를 바꿔보세요."}
            footer={"사장님 매장에 맞는 시즌 흐름으로 바꿔보세요"}
            bg="bg-[#FFF9F9]"
          >
            <div className="grid grid-cols-1 gap-4 sm:grid-cols-2">
              {seasonCards.map((item, idx) => (
                <div key={idx} className={`${item.color} flex h-40 flex-col justify-between rounded-[1.75rem] border border-white/60 p-5 text-left shadow-sm transition-transform hover:scale-[1.02] sm:h-48 sm:p-6`}>
                  <div className="flex items-start justify-between">
                    <span className="text-4xl sm:text-5xl">{item.img}</span>
                    <span className="text-[10px] font-bold uppercase tracking-[0.18em] opacity-40">{item.tag}</span>
                  </div>
                  <p className="text-lg font-black text-stone-800 sm:text-[1.15rem]">{item.title}</p>
                </div>
              ))}
            </div>
          </BrochureSection>

          <BrochureSection
            id={6}
            title={"이번 시즌 홍보,\n더 가볍게 시작해보세요"}
            subtitle={"매장 사진 1장과 꽃 사진 3장만 보내주시면 우리 매장에 WooB을 설치했을 때 느낌을 무료 시안으로 먼저 보여드립니다."}
            bg="bg-[#1B2B21]"
            isDark={true}
          >
            <div className="flex flex-col items-center rounded-[2.25rem] border border-white/10 bg-emerald-800/20 p-7 text-center backdrop-blur-sm sm:rounded-[3rem] sm:p-10 md:p-12">
              <div className="mb-7 text-6xl drop-shadow-2xl sm:mb-8 sm:text-7xl md:mb-10 md:text-8xl">💌</div>

              <div className="w-full max-w-xl space-y-4">
                <h3 className="text-2xl font-black leading-tight tracking-tight text-white sm:text-[1.9rem] md:text-4xl">
                  지금 바로 담당자에게<br />시안 요청하기
                </h3>
                <p className="flex items-center justify-center gap-2 text-sm font-bold text-emerald-400 sm:text-base">
                  <LucideIcon name="message-square" size={18} />
                  상담원이 확인 후 바로 답변드립니다
                </p>

                <button
                  type="button"
                  onClick={() => setIsContactOpen((prev) => !prev)}
                  className="mt-2 inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-white px-5 py-4 text-base font-black text-emerald-900 shadow-lg transition hover:-translate-y-0.5 hover:bg-emerald-50 focus:outline-none focus:ring-4 focus:ring-white/20 sm:text-lg"
                  aria-expanded={isContactOpen}
                  aria-controls="contact-panel"
                >
                  <LucideIcon name={isContactOpen ? 'chevron-up' : 'chevron-down'} size={18} />
                  지금 바로 담당자에게 시안 요청하기
                </button>

                {isContactOpen ? (
                  <div
                    id="contact-panel"
                    className="mx-auto mt-4 w-full rounded-[1.75rem] border border-white/10 bg-white/95 p-5 text-left shadow-2xl sm:p-6"
                  >
                    <p className="text-sm font-bold tracking-[0.18em] text-emerald-700">CONTACT</p>
                    <p className="mt-2 text-[1.8rem] font-black tracking-tight text-stone-900 sm:text-[2rem]">{phoneNumber}</p>
                    <p className="mt-2 text-sm leading-6 text-stone-500 sm:text-base">
                      번호복사 버튼을 누르신 후 문자를 보내주세요.
                    </p>

                    <div className="mt-5 grid grid-cols-1 gap-3">
                      <button
                        type="button"
                        onClick={handleCopyNumber}
                        className="inline-flex items-center justify-center gap-2 rounded-2xl border border-stone-200 bg-white px-4 py-3 text-sm font-bold text-stone-700 transition hover:bg-stone-50 sm:text-base"
                      >
                        <LucideIcon name="copy" size={16} />
                        {copyMessage}
                      </button>
                    </div>
                  </div>
                ) : null}
              </div>
            </div>
          </BrochureSection>

          <footer className="border-t border-stone-100 bg-stone-50 py-10 text-center sm:py-12">
            <div className="mb-2 text-lg font-black tracking-tighter text-emerald-900">WooB.</div>
            <p className="text-sm text-stone-400">© 2024 WooB. All rights reserved.</p>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
