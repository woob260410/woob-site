<div id="root"></div><script src="https://unpkg.com/react@18/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><script type="text/babel">  const { useEffect, useRef } = React;  // Lucide 아이콘을 React에서 사용하기 위한 헬퍼 컴포넌트  const LucideIcon = ({ name, size = 24, className = "" }) => {    const iconRef = useRef(null);    useEffect(() => {      if (window.lucide) {        window.lucide.createIcons({          targets: [iconRef.current]        });      }    }, [name]);    return <i ref={iconRef} data-lucide={name} className={className} style={{ width: size, height: size }}></i>;  };  const BrochureSection = ({ id, title, subtitle, footer, bg, children, isDark }) => (    <section className={`min-h-screen flex flex-col justify-center items-center p-8 md:p-20 ${bg} transition-colors duration-500 relative overflow-hidden border-b border-stone-100`}>      <div className="max-w-5xl w-full grid md:grid-cols-2 gap-12 items-center">        <div className="space-y-6">          <div className="space-y-2">            <span className={`text-sm font-bold tracking-widest uppercase opacity-60 ${isDark ? 'text-emerald-400' : 'text-emerald-800'}`}>              PAGE 0{id}            </span>            <h2 className={`text-3xl md:text-5xl font-black leading-tight whitespace-pre-line ${isDark ? 'text-white' : 'text-stone-900'}`}>              {title}            </h2>          </div>          <p className={`text-lg md:text-xl leading-relaxed opacity-80 ${isDark ? 'text-emerald-100' : 'text-stone-600'}`}>            {subtitle}          </p>          {footer && (            <div className={`pt-6 border-t ${isDark ? 'border-white/10' : 'border-stone-200'}`}>              <p className={`font-bold ${isDark ? 'text-emerald-400' : 'text-emerald-700'}`}>                {footer}              </p>            </div>          )}        </div>        <div className="w-full">{children}</div>      </div>    </section>  );  const App = () => {    return (      <div className="min-h-screen font-sans bg-white selection:bg-emerald-100">        <nav className="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-stone-100 px-6 py-4 flex justify-between items-center">          <div className="font-black text-2xl tracking-tighter text-emerald-900">WooB.</div>        </nav>        {/* Page 1 */}        <BrochureSection          id={1}          title={"매번 홍보물 만들기,\n이제 조금 덜 힘들어도 됩니다"}          subtitle={"꽃집은 시즌이 곧 매출입니다. 하지만 계절과 이벤트가 바뀔 때마다 홍보를 다시 만드는 일은 늘 부담이 됩니다."}          footer={"꽃집 홍보도 운영이 쉬워야 오래 갑니다"}          bg="bg-[#FDFBF7]"        >          <div className="relative h-96 w-full flex items-center justify-center">            <div className="absolute top-0 left-0 bg-white p-6 rounded-2xl shadow-xl border border-stone-100 rotate-[-4deg] z-20 hidden md:block">              <p className="text-xs font-bold text-rose-500 mb-1 italic">MAY EVENT</p>              <p className="text-base font-bold text-stone-800">어버이날 예약 접수</p>            </div>            <div className="absolute bottom-4 right-0 bg-white p-6 rounded-2xl shadow-xl border border-stone-100 rotate-[4deg] z-20 hidden md:block">              <p className="text-xs font-bold text-emerald-600 mb-1 italic">GRADUATION</p>              <p className="text-base font-bold text-stone-800">졸업식 꽃다발 안내</p>            </div>            <div className="bg-stone-200 w-72 h-96 rounded-3xl overflow-hidden shadow-2xl border-8 border-white relative group">               <img                  src="https://images.unsplash.com/photo-1526047932273-341f2a7631f9?auto=format&fit=crop&q=80&w=800"                  alt="풍성한 꽃다발을 들고 있는 모습"                  className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"               />               <div className="absolute inset-0 bg-emerald-900/10 group-hover:bg-transparent transition-all"></div>            </div>          </div>        </BrochureSection>        {/* Page 2 */}        <BrochureSection          id={2}          title={"사장님이 진짜 힘든 건,\n계속 다시 만드는 일입니다"}          subtitle={"포스터 새로 만들고, 문구 바꾸고, 출력하고, 붙이고, 다시 교체하고. 꽃집은 이런 반복 업무가 계속 쌓입니다."}          footer={"예쁜 홍보보다, 계속 운영 가능한 홍보가 필요할 때"}          bg="bg-white"        >          <div className="grid grid-cols-2 gap-6">            {[              { icon: "refresh-cw", text: "문구 수정 및 교체", color: "text-rose-400" },              { icon: "scissors", text: "출력 및 부착 작업", color: "text-amber-400" },              { icon: "calendar", text: "시즌별 포스터 제작", color: "text-blue-400" },              { icon: "check-circle", text: "재고 확인 및 연동", color: "text-emerald-400" },            ].map((item, idx) => (              <div key={idx} className="p-8 bg-stone-50 rounded-3xl flex flex-col items-start gap-4 border border-stone-100 hover:border-emerald-200 transition-all">                <div className={item.color}><LucideIcon name={item.icon} size={32} /></div>                <p className="font-bold text-stone-700 leading-tight">{item.text}</p>              </div>            ))}          </div>        </BrochureSection>        {/* Page 3 */}        <BrochureSection          id={3}          title={"그래서 필요한 건\n운영하기 쉬운 방식입니다"}          subtitle={"WooB은 꽃집 홍보를 한 번 반짝하고 끝나는 방식이 아니라 시즌마다 바꿔가며 운영하기 쉬운 방식으로 만듭니다."}          footer={"이번 시즌도, 다음 시즌도 이어서 쓰기 쉽게"}          bg="bg-[#F7F9F7]"        >          <div className="relative h-96 bg-white rounded-[2rem] shadow-2xl border border-emerald-100 overflow-hidden flex flex-col items-center justify-center p-12 text-center">              <div className="flex justify-center gap-8 mb-8 animate-bounce">                <div className="w-16 h-16 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-500 shadow-sm"><LucideIcon name="flower" size={32}/></div>                <div className="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500 shadow-sm"><LucideIcon name="calendar" size={32}/></div>                <div className="w-16 h-16 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-500 shadow-sm"><LucideIcon name="user" size={32}/></div>              </div>              <div className="space-y-2">                <p className="text-2xl font-black text-emerald-900">시즌 최적화 오토-디스플레이</p>                <p className="text-stone-500 italic">봄 시즌 → 가정의 달 → 졸업 시즌</p>                <div className="mt-6 flex items-center justify-center gap-2 text-emerald-600 font-bold bg-emerald-50 px-4 py-2 rounded-full inline-flex mx-auto">                  <LucideIcon name="refresh-cw" size={16} className="animate-spin" /> 실시간 콘텐츠 업데이트                </div>              </div>          </div>        </BrochureSection>        {/* Page 4 */}        <BrochureSection          id={4}          title={"우리 꽃집에 맞는\n운영 방식은 3가지입니다"}          subtitle={"처음부터 크게보다, 우리 매장에 맞게 선택하세요."}          bg="bg-white"        >          <div className="space-y-4 text-left">            {[              { label: "기본 운영", name: "라이트", price: "968,000원", desc: "대표 상품 중심의 기본 운영" },              { label: "추천", name: "스탠다드", price: "1,089,000원", desc: "시즌 2개 흐름 운영, 가장 추천", highlight: true },              { label: "브랜딩 운영", name: "프리미엄", price: "1,815,000원", desc: "브랜딩과 문의 동선까지 연결하는 운영형" },            ].map((item, idx) => (              <div key={idx} className={`relative p-8 rounded-3xl border-2 transition-all cursor-pointer group ${item.highlight ? 'border-emerald-500 bg-emerald-50/30' : 'border-stone-100 hover:border-stone-300 bg-white'}`}>                <span className={`absolute -top-3 left-8 px-3 py-1 rounded-full text-xs font-bold ${item.highlight ? 'bg-emerald-500 text-white' : 'bg-stone-200 text-stone-600'}`}>                  {item.label}                </span>                <div className="flex justify-between items-center">                  <div>                    <h4 className="font-black text-stone-800 text-2xl group-hover:text-emerald-900 transition-colors">{item.name}</h4>                    <p className="text-stone-500 mt-1">{item.desc}</p>                  </div>                  <div className="text-right">                    <p className="text-2xl font-black text-emerald-800">{item.price}</p>                    <p className="text-[10px] text-stone-400 uppercase tracking-widest">one-time payment</p>                  </div>                </div>              </div>            ))}          </div>        </BrochureSection>        {/* Page 5 */}        <BrochureSection          id={5}          title={"꽃집에 바로 적용할 수 있는\n시즌 운영 예시"}          subtitle={"봄 시즌 / 가정의 달 / 졸업 시즌 / 일반 운영까지 흐름에 맞춰 대표 상품과 문구를 바꿔보세요."}          footer={"사장님 매장에 맞는 시즌 흐름으로 바꿔보세요"}          bg="bg-[#FFF9F9]"        >          <div className="grid grid-cols-2 gap-4">            {[              { title: "봄 시즌", color: "bg-green-100", img: "🌷", tag: "Spring" },              { title: "가정의 달", color: "bg-rose-100", img: "💝", tag: "Family" },              { title: "졸업 시즌", color: "bg-blue-100", img: "🎓", tag: "Grad" },              { title: "일반 운영", color: "bg-stone-100", img: "🌿", tag: "Daily" },            ].map((item, idx) => (              <div key={idx} className={`${item.color} h-48 rounded-3xl p-6 flex flex-col justify-between border border-white/50 shadow-sm hover:scale-[1.02] transition-transform cursor-pointer text-left`}>                <div className="flex justify-between items-start">                  <span className="text-4xl">{item.img}</span>                  <span className="text-[10px] font-bold uppercase tracking-widest opacity-40">{item.tag}</span>                </div>                <p className="text-lg font-black text-stone-800">{item.title}</p>              </div>            ))}          </div>        </BrochureSection>        {/* Page 6 */}        <BrochureSection          id={6}          title={"이번 시즌 홍보,\n더 가볍게 시작해보세요"}          subtitle={"매장 사진 1장과 꽃 사진 3장만 보내주시면 우리 매장에 WooB을 설치했을 때 느낌을 무료 시안으로 먼저 보여드립니다."}          footer={""}          bg="bg-[#1B2B21]"          isDark={true}        >          <div className="bg-emerald-800/20 backdrop-blur-sm p-12 rounded-[3rem] border border-white/10 flex flex-col items-center text-center">            <div className="text-8xl mb-10 animate-pulse drop-shadow-2xl">              💌            </div>            <div className="space-y-4">              <h3 className="text-white text-2xl md:text-3xl font-black tracking-tight leading-tight">                지금 바로 담당자에게<br />시안 요청하기              </h3>              <p className="text-emerald-400 font-bold flex items-center justify-center gap-2">                <LucideIcon name="message-square" size={18} /> 상담원이 확인 후 바로 답변드립니다              </p>            </div>          </div>        </BrochureSection>        <footer className="py-12 bg-stone-50 text-center border-t border-stone-100">          <div className="font-black text-lg tracking-tighter text-emerald-900 mb-2">WooB.</div>          <p className="text-stone-400 text-sm">© 2024 WooB. All rights reserved.</p>        </footer>        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 animate-bounce flex flex-col items-center text-emerald-900/40 pointer-events-none hidden md:flex">          <span className="text-[10px] font-bold uppercase tracking-widest mb-2">Scroll Down</span>          <LucideIcon name="mouse-pointer-2" size={20} />        </div>      </div>    );  };  const root = ReactDOM.createRoot(document.getElementById('root'));  root.render(<App />);
